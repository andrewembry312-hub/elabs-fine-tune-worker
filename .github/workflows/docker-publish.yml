name: Docker - Fine-Tune Worker

on:
  push:
    branches: [master]
    paths-ignore: ['README.md', 'LICENSE', '.gitignore']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/andrewembry312-hub/elabs-fine-tune-worker:latest
            ghcr.io/andrewembry312-hub/elabs-fine-tune-worker:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/andrewembry312-hub/elabs-fine-tune-worker:latest
          cache-to: type=inline
