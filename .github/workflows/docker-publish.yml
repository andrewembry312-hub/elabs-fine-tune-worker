name: Docker - Axolotl Fine-Tuning

on:
  push:
    branches: [main]
    paths-ignore: ['README.md', 'LICENSE', '.gitignore']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/andrewembry312-hub/axolotl-runpod-worker:latest
            ghcr.io/andrewembry312-hub/axolotl-runpod-worker:${{ github.sha }}
